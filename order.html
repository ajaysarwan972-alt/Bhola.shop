<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhola Shop - Order</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:url("https://i.ibb.co/7QpKsCX/shiv.jpg") no-repeat center center/cover;
}
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}
.header{
  background:#ff3f6c;
  color:#fff;
  padding:15px;
  text-align:center;
}
.box{
  background:#ffffffdd;
  padding:15px;
  border-radius:15px;
  margin:15px;
}
.product{
  text-align:center;
}
.product img{
  width:100%;
  border-radius:10px;
}
input, select, textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  background:#ff3f6c;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="header">
  <h2>🛒 Bhola Shop</h2>
  <p>Cash on Delivery 🚚</p>
</div>

<div class="box">

<div class="product" id="productBox"></div>

<!-- ✅ SIZE SELECT -->
<select id="size">
  <option value="">Select Size</option>
</select>

<h3>Enter Details</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="mobile" placeholder="Mobile Number">
<input type="text" id="pincode" placeholder="Pincode">
<textarea id="address" placeholder="Full Address"></textarea>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>

// ✅ SUPABASE CONNECT
const supabase = window.supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// ✅ GET PRODUCT
const product = JSON.parse(localStorage.getItem("product"));

// ✅ SHOW PRODUCT + SIZE
if(product){

// product show
document.getElementById("productBox").innerHTML = `
<img src="${product.image}">
<h3>${product.name}</h3>
<h4>₹${product.price}</h4>
`;

// size split (S,M,L → array)
if(product.size){
let sizes = product.size.split(",");
let options = `<option value="">Select Size</option>`;

sizes.forEach(s=>{
options += `<option value="${s.trim()}">${s.trim()}</option>`;
});

document.getElementById("size").innerHTML = options;
}

}else{
document.getElementById("productBox").innerHTML = "<h3>No Product Found</h3>";
}

// ✅ ORDER FUNCTION
async function placeOrder(){

let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;
let address = document.getElementById("address").value;
let pincode = document.getElementById("pincode").value;
let size = document.getElementById("size").value;

if(!name || !mobile || !address || !pincode || !size){
alert("Sab fill kar bhai + size select kar");
return;
}

const { error } = await supabase.from("orders").insert([{
product_name: product.name,
price: product.price,
size: size, // ✅ SIZE SAVE
name: name,
mobile: mobile,
address: address,
pincode: pincode,
status: "pending",
payment_type: "COD"
}]);

if(error){
alert("Order failed ❌");
console.log(error);
return;
}

alert("Order Placed ✅");

localStorage.removeItem("product");
window.location.href = "index.html";
}

</script>

</body>
</html>
