<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhola Shop - Order</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:url("https://i.ibb.co/7QpKsCX/shiv.jpg") no-repeat center center/cover;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.header{
  background:#ff3f6c;
  color:#fff;
  padding:15px;
  text-align:center;
}

.box{
  background:#ffffffdd;
  padding:15px;
  border-radius:15px;
  margin:15px;
}

.product{
  text-align:center;
}

.product img{
  width:100%;
  border-radius:10px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#ff3f6c;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="header">
  <h2>🛒 Bhola Shop</h2>
  <p>Cash on Delivery 🚚</p>
</div>

<div class="box">

<!-- product show -->
<div class="product" id="productBox"></div>

<h3>Enter Details</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="mobile" placeholder="Mobile Number">
<input type="text" id="pincode" placeholder="Pincode">
<textarea id="address" placeholder="Full Address"></textarea>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>

// supabase connect
const supabase = window.supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// product get
const product = JSON.parse(localStorage.getItem("product"));

// show product
if(product){
document.getElementById("productBox").innerHTML = `
<img src="${product.image}">
<h3>${product.name}</h3>
<h4>₹${product.price}</h4>
`;
}

// order function
async function placeOrder(){

let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;
let address = document.getElementById("address").value;
let pincode = document.getElementById("pincode").value;

if(!name || !mobile || !address || !pincode){
alert("Sab fill kar bhai");
return;
}

await supabase.from("orders").insert([{
product_name: product.name,
price: product.price,
name: name,
mobile: mobile,
address: address,
pincode: pincode,
status: "pending",
payment_type: "COD"
}]);

alert("Order Placed ✅");
window.location.href = "index.html";
}

</script>

</body>
</html>
